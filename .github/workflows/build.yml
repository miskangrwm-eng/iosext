name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare extension
        run: |
          if [ ! -f extension_latest.zip ]; then
            echo "extension_latest.zip NOT FOUND"
            exit 1
          fi

          rm -rf extension
          mkdir extension
          unzip extension_latest.zip -d extension

      - name: Fix structure (optional)
        run: |
          mv extension/*/* extension/ 2>/dev/null || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -scheme WrapperApp \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
