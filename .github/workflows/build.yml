name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare extension
        run: |
          rm -rf extension
          mkdir extension
          unzip extension_latest.zip -d extension

      - name: Fix structure
        run: |
          mv extension/*/* extension/ 2>/dev/null || true

      - name: Add ExtensionHandler
        run: |
          cat > extension/ExtensionHandler.swift << 'EOF'
          import SafariServices

          class ExtensionHandler: NSObject, NSExtensionRequestHandling {
              func beginRequest(with context: NSExtensionContext) {
                  context.completeRequest(returningItems: nil, completionHandler: nil)
              }
          }
          EOF

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -scheme WrapperApp \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/*.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
