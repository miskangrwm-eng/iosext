name: Build iOS Wrapper

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare extension
        run: |
          rm -rf extension
          mkdir extension
          unzip extension_latest.zip -d extension

      - name: Fix structure (optional)
        run: |
          mv extension/*/* extension/ 2>/dev/null || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -scheme WrapperApp \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/Build/Products/Release-iphoneos/
